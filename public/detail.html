<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZamsXit Code | View Source</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['"Plus Jakarta Sans"','sans-serif']}}}}</script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="antialiased bg-[#101010] text-gray-200 selection:bg-blue-500/30 selection:text-white relative min-h-screen flex flex-col">
    
    <div class="fixed inset-0 z-0 pointer-events-none bg-grid-overlay opacity-50"></div>
    <div class="fixed inset-0 z-0 pointer-events-none bg-gradient-to-t from-[#101010] via-transparent to-transparent"></div>

    <header class="bg-[#101010]/80 backdrop-blur-xl border-b border-[#2a2a2a] sticky top-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 group">
                <span class="text-xl font-extrabold tracking-tighter text-white">ZamsXit</span>
            </a>
            <div class="flex items-center gap-6">
                <a href="/snippets" class="text-sm font-bold text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                    <span class="material-icons text-[16px]">arrow_back</span> Library
                </a>
            </div>
        </div>
    </header>

    <main class="flex-1 relative z-10 w-full max-w-5xl mx-auto px-6 pt-10 pb-32 flex flex-col" id="detailContentContainer">
        <div id="detailContent" class="w-full flex-1"></div>

        <div class="w-full flex items-center justify-center opacity-40 mt-16 pt-8">
            <div class="w-1 h-1 rounded-full bg-gray-400"></div>
            <div class="w-16 h-px bg-gradient-to-r from-gray-500 to-transparent ml-3"></div>
        </div>
    </main>

<div id="passwordModal" class="hidden fixed inset-0 z-[60] bg-[#101010]/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-[#141414] border border-[#2a2a2a] p-10 rounded-3xl shadow-2xl relative overflow-hidden fade-in">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-rose-500 to-transparent opacity-50"></div>
            
            <div class="text-center mb-8">
                <div class="w-14 h-14 bg-gradient-to-br from-rose-500/20 to-pink-500/20 border border-rose-500/30 rounded-2xl flex items-center justify-center mx-auto mb-5">
                    <span class="material-icons text-3xl text-rose-400">lock</span>
                </div>
                <h2 class="text-2xl font-extrabold tracking-tighter text-white mb-1">Protected Item</h2>
                <p class="text-xs text-gray-500 font-medium">Decryption key required.</p>
            </div>
            
            <div class="space-y-5">
                <input type="password" id="snippetPassword" class="w-full codeverse-input rounded-xl px-4 py-3.5 text-center font-mono tracking-widest text-sm text-white" placeholder="SECRET KEY">
                <button id="unlockBtn" class="w-full bg-white text-black hover:bg-gray-200 font-bold py-3.5 rounded-xl transition-all active:scale-95 text-sm flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                    Decrypt Payload <span class="material-icons text-[16px]">lock_open</span>
                </button>
            </div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
